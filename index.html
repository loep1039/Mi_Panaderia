<audio id="alarma" loop>
    <source src="https://assets.mixkit.co/active_storage/sfx/995/995-preview.mp3" type="audio/mpeg">
</audio>

<script>
    let tiempoRestante;
    let intervalo;
    const sonidoAlarma = document.getElementById('alarma');
    const display = document.getElementById('display');

    function iniciarTimer() {
        clearInterval(intervalo);
        
        // Asegurarnos de que el sonido esté detenido al empezar de nuevo
        sonidoAlarma.pause();
        sonidoAlarma.currentTime = 0;

        const mins = document.getElementById('minutosInput').value;
        if(!mins || mins <= 0) return;

        tiempoRestante = mins * 60;

        intervalo = setInterval(() => {
            const minutos = Math.floor(tiempoRestante / 60);
            const segundos = tiempoRestante % 60;
            display.innerText = `${minutos.toString().padStart(2, '0')}:${segundos.toString().padStart(2, '0')}`;

            if (tiempoRestante <= 0) {
                clearInterval(intervalo);
                
                // ACTIVACIÓN DE LA ALARMA PERSISTENTE
                sonidoAlarma.loop = true; // Forzamos el bucle por seguridad
                sonidoAlarma.play(); 
                
                alert("¡PAN LISTO! Presiona OK para detener la alarma.");
                // Si el usuario cierra el alert, podemos detener el sonido automáticamente:
                detenerTimer();
            } else {
                tiempoRestante--;
            }
        }, 1000);
    }

    function detenerTimer() {
        clearInterval(intervalo);
        // Detener el sonido y resetearlo al inicio
        sonidoAlarma.pause();
        sonidoAlarma.currentTime = 0;
    }
</script>
