<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cronómetro de Horneado | Timer Profesional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fef7e8 0%, #fcf3e3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .timer-card {
            background: white;
            border-radius: 32px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 1px solid #eeddcb;
        }

        h1 {
            font-size: 1.8rem;
            color: #8B4513;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .subtitle {
            color: #8B7355;
            font-size: 0.85rem;
            margin-bottom: 24px;
            border-bottom: 2px solid #eeddcb;
            display: inline-block;
            padding-bottom: 6px;
        }

        /* Selector de tiempo */
        .time-selector {
            margin-bottom: 24px;
        }

        .time-selector label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            color: #8B7355;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .time-input-group {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .time-input {
            background: #f9f0e4;
            border: 1.5px solid #eeddcb;
            border-radius: 40px;
            padding: 10px 16px;
            font-size: 1rem;
            font-weight: 600;
            color: #2c2418;
            width: 100px;
            text-align: center;
            outline: none;
            font-family: monospace;
            font-size: 1.2rem;
        }

        .time-input:focus {
            border-color: #D2691E;
            box-shadow: 0 0 0 2px rgba(210, 105, 30, 0.2);
        }

        /* Display del cronómetro */
        .display {
            background: #f9f0e4;
            border-radius: 60px;
            padding: 20px;
            margin-bottom: 24px;
            border: 2px solid #eeddcb;
        }

        .cronometro {
            font-family: monospace;
            font-size: 3.5rem;
            font-weight: 700;
            color: #D2691E;
            letter-spacing: 5px;
        }

        /* Botones */
        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-start {
            background: linear-gradient(135deg, #D2691E, #B85C1A);
            color: white;
            box-shadow: 0 4px 12px rgba(210, 105, 30, 0.3);
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(210, 105, 30, 0.4);
        }

        .btn-stop {
            background: #e53e3e;
            color: white;
        }

        .btn-stop:hover {
            background: #c53030;
            transform: translateY(-2px);
        }

        .btn-reset {
            background: #718096;
            color: white;
        }

        .btn-reset:hover {
            background: #4a5568;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* Mensaje de alerta */
        .alert-message {
            background: #fef5e8;
            border-radius: 40px;
            padding: 12px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 500;
            color: #D2691E;
            animation: pulse 0.5s ease;
        }

        .alert-message.show {
            display: flex;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Presets rápidos */
        .presets {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .preset-btn {
            background: #f0e5d8;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #8B4513;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-btn:hover {
            background: #D2691E;
            color: white;
        }

        footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #b48c62;
        }
    </style>
</head>
<body>
    <div class="timer-card">
        <h1>
            <i class="fas fa-oven" style="font-size: 1.5rem;"></i>
            Cronómetro de Horneado
        </h1>
        <div class="subtitle">⏱️ Control preciso para panes artesanales</div>

        <div class="time-selector">
            <label>Tiempo de horneado</label>
            <div class="time-input-group">
                <input type="number" id="minutos" class="time-input" value="20" min="1" max="120" step="1">
                <span style="font-size: 1.2rem; font-weight: 600;">minutos</span>
            </div>
        </div>

        <div class="display">
            <div id="cronometro" class="cronometro">20:00</div>
        </div>

        <div class="buttons">
            <button class="btn btn-start" onclick="iniciarCronometro()">
                <i class="fas fa-play"></i> Iniciar
            </button>
            <button class="btn btn-stop" onclick="detenerCronometro()">
                <i class="fas fa-stop"></i> Detener
            </button>
            <button class="btn btn-reset" onclick="reiniciarCronometro()">
                <i class="fas fa-undo-alt"></i> Reiniciar
            </button>
        </div>

        <div class="presets">
            <button class="preset-btn" onclick="setTiempo(15)">🍞 Pan Francés (15')</button>
            <button class="preset-btn" onclick="setTiempo(20)">🥖 Pan Campesino (20')</button>
            <button class="preset-btn" onclick="setTiempo(25)">🍔 Pan Hamburguesa (25')</button>
            <button class="preset-btn" onclick="setTiempo(35)">🍰 Torta Naranja (35')</button>
        </div>

        <div id="alerta" class="alert-message">
            <i class="fas fa-bell"></i>
            🎉 ¡El pan está listo! 🎉
            <i class="fas fa-bell"></i>
        </div>

        <footer>
            <i class="fas fa-volume-up"></i> Alarma sonora al finalizar
        </footer>
    </div>

    <script>
        let tiempoRestante = 0;
        let temporizadorActivo = false;
        let intervalo = null;

        function actualizarDisplay() {
            const minutos = Math.floor(tiempoRestante / 60);
            const segundos = tiempoRestante % 60;
            const display = document.getElementById('cronometro');
            display.textContent = `${minutos.toString().padStart(2, '0')}:${segundos.toString().padStart(2, '0')}`;
        }

        function iniciarCronometro() {
            if (temporizadorActivo) {
                detenerCronometro();
            }
            
            const minutos = parseInt(document.getElementById('minutos').value) || 0;
            if (minutos <= 0) return;
            
            tiempoRestante = minutos * 60;
            actualizarDisplay();
            temporizadorActivo = true;
            
            intervalo = setInterval(() => {
                if (tiempoRestante <= 0) {
                    detenerCronometro();
                    reproducirAlarma();
                    mostrarAlerta();
                } else {
                    tiempoRestante--;
                    actualizarDisplay();
                }
            }, 1000);
        }

        function detenerCronometro() {
            if (intervalo) {
                clearInterval(intervalo);
                intervalo = null;
            }
            temporizadorActivo = false;
        }

        function reiniciarCronometro() {
            detenerCronometro();
            const minutos = parseInt(document.getElementById('minutos').value) || 0;
            tiempoRestante = minutos * 60;
            actualizarDisplay();
            ocultarAlerta();
        }

        function setTiempo(minutos) {
            detenerCronometro();
            document.getElementById('minutos').value = minutos;
            tiempoRestante = minutos * 60;
            actualizarDisplay();
            ocultarAlerta();
        }

        function reproducirAlarma() {
            try {
                // Usar Web Audio API para generar un beep
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = 880; // Nota La5
                gainNode.gain.value = 0.3;
                
                oscillator.start();
                
                setTimeout(() => {
                    oscillator.stop();
                    audioContext.close();
                }, 800);
                
                // Vibración para móviles
                if ('vibrate' in navigator) {
                    navigator.vibrate([500, 300, 500]);
                }
            } catch(e) {
                console.log('Alarma no disponible');
                // Fallback: alerta visual intensa
                const alerta = document.getElementById('alerta');
                alerta.style.backgroundColor = '#e53e3e';
                alerta.style.color = 'white';
                setTimeout(() => {
                    alerta.style.backgroundColor = '';
                    alerta.style.color = '';
                }, 1000);
            }
        }

        function mostrarAlerta() {
            const alerta = document.getElementById('alerta');
            alerta.classList.add('show');
            // Auto-ocultar después de 5 segundos
            setTimeout(() => {
                ocultarAlerta();
            }, 5000);
        }

        function ocultarAlerta() {
            const alerta = document.getElementById('alerta');
            alerta.classList.remove('show');
        }

        // Inicializar con valor por defecto
        window.onload = () => {
            setTiempo(20);
        };
    </script>
</body>
</html>
