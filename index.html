<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cronómetro | Volteo + Final</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(145deg, #1a1a1a 0%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .timer-card {
            background: #0f0f0f;
            border-radius: 32px;
            padding: 28px 24px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid #2a2a2a;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.3rem;
            color: #b87c4a;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #6a6a6a;
            font-size: 0.6rem;
            margin-bottom: 20px;
        }

        .time-selector {
            margin-bottom: 20px;
        }

        .time-selector label {
            display: block;
            font-size: 0.6rem;
            color: #8b8b8b;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .time-input {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 1.3rem;
            color: #d48c4a;
            width: 120px;
            text-align: center;
            font-family: monospace;
        }

        .display {
            background: #050505;
            border-radius: 20px;
            padding: 20px 20px;
            margin-bottom: 20px;
            border: 1px solid #2a2a2a;
        }

        .cronometro {
            font-family: 'Courier New', monospace;
            font-size: 4rem;
            font-weight: bold;
            color: #ff6a2e;
            text-shadow: 0 0 5px #ff6a2e, 0 0 10px #ff6a2e;
            letter-spacing: 6px;
        }

        /* Estados de alarma */
        .estado {
            margin: 12px 0;
            padding: 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .estado.espera {
            background: #1a1a1a;
            color: #5a5a5a;
            border: 1px solid #2a2a2a;
        }

        .estado.volteo {
            background: #2a2a1a;
            color: #ffaa44;
            border: 1px solid #ffaa44;
            animation: pulse 1s infinite;
        }

        .estado.final {
            background: #2a1a1a;
            color: #ff6a2e;
            border: 1px solid #ff6a2e;
            animation: pulse 0.8s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; background: #3a2a1a; }
        }

        .btn-start {
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            color: #d48c4a;
            border: 1px solid #3a3a3a;
            padding: 14px 32px;
            border-radius: 50px;
            width: 100%;
            font-family: monospace;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }

        .btn-start:hover {
            background: #3a3a3a;
            color: #ff9a5a;
            border-color: #d48c4a;
        }

        .alert-message {
            background: #1a1a1a;
            border: 1px solid #d48c4a;
            border-radius: 40px;
            padding: 10px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #d48c4a;
            margin-top: 12px;
            font-size: 0.75rem;
        }

        .alert-message.show {
            display: flex;
        }

        .notification-status {
            font-size: 0.55rem;
            color: #5a5a5a;
            margin-top: 10px;
            cursor: pointer;
            text-decoration: underline;
        }

        footer {
            margin-top: 12px;
            font-size: 0.55rem;
            color: #5a5a5a;
        }

        @media (max-width: 480px) {
            .cronometro {
                font-size: 2.5rem;
                letter-spacing: 4px;
            }
            .estado {
                font-size: 0.6rem;
                padding: 8px;
            }
        }
    </style>
</head>
<body>

<div class="timer-card">
    <h1>⏱️ TIMER HORNEADO</h1>
    <div class="subtitle">⚡ VOLTEO + RETIRADO ⚡</div>

    <div class="time-selector">
        <label>⏱️ TIEMPO TOTAL (minutos)</label>
        <div>
            <input type="number" id="minutos" class="time-input" value="24" min="2" max="120" step="1">
        </div>
        <div style="font-size: 0.55rem; color: #6a6a6a; margin-top: 5px;">
            ⏰ Alarma a la mitad para VOLTEAR las latas
        </div>
    </div>

    <div class="display">
        <div id="cronometro" class="cronometro">24:00</div>
    </div>

    <!-- Estado actual del horneado -->
    <div id="estadoTexto" class="estado espera">
        ⏳ ESPERANDO INICIO
    </div>

    <div class="buttons">
        <button class="btn-start" onclick="iniciarCronometro()">
            ▶ INICIAR HORNEADO
        </button>
        <button class="btn-start" onclick="detenerCronometro()" style="background: #2a1a1a; color: #aa5544;">
            ⏹️ DETENER
        </button>
    </div>

    <div id="alertaVolteo" class="alert-message">
        <i class="fas fa-exchange-alt"></i> 🔄 ¡VOLTEAR LAS LATAS! 🔄 <i class="fas fa-exchange-alt"></i>
    </div>
    <div id="alertaFinal" class="alert-message">
        <i class="fas fa-bell"></i> 🍞 ¡PAN LISTO! RETIRAR 🍞 <i class="fas fa-bell"></i>
    </div>

    <div id="notifStatus" class="notification-status" onclick="solicitarPermisoNotificacion()">
        🔔 Activar notificaciones
    </div>

    <footer>
        <i class="fas fa-volume-up"></i> Dos alarmas: Volteo (mitad) + Final
    </footer>
</div>

<script>
    // ========== VARIABLES ==========
    let tiempoTotalSegundos = 0;
    let tiempoRestante = 0;
    let temporizadorActivo = false;
    let intervalo = null;
    let alarmaActiva = false;
    let contextoAudio = null;
    let osciladoresActivos = [];
    let wakeLock = null;
    let volteoActivado = false;   // Control para no repetir alarma de volteo

    // ========== NOTIFICACIONES ==========
    function solicitarPermisoNotificacion() {
        if ('Notification' in window) {
            if (Notification.permission === 'granted') {
                mostrarNotificacion('🔔 Notificaciones activadas', 'Recibirás alertas de volteo y final');
                document.getElementById('notifStatus').innerHTML = '✅ Notificaciones activadas';
            } else if (Notification.permission !== 'denied') {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        document.getElementById('notifStatus').innerHTML = '✅ Notificaciones activadas';
                        mostrarNotificacion('🔔 Notificaciones activadas', 'Recibirás alertas de volteo y final');
                    }
                });
            }
        }
    }

    function mostrarNotificacion(titulo, mensaje) {
        if ('Notification' in window && Notification.permission === 'granted') {
            new Notification(titulo, {
                body: mensaje,
                vibrate: [500, 300, 500]
            });
        }
    }

    // ========== WAKE LOCK ==========
    async function solicitarWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch(e) {}
    }

    function liberarWakeLock() {
        if (wakeLock) {
            wakeLock.release();
            wakeLock = null;
        }
    }

    // ========== ALARMA ==========
    function detenerAlarma() {
        alarmaActiva = false;
        osciladoresActivos.forEach(oscilador => {
            try { oscilador.stop(); } catch(e) {}
        });
        osciladoresActivos = [];
        if (contextoAudio) {
            try { contextoAudio.close(); } catch(e) {}
            contextoAudio = null;
        }
    }

    function reproducirAlarma(tipo) {
        if (alarmaActiva) return;
        alarmaActiva = true;
        
        try {
            contextoAudio = new (window.AudioContext || window.webkitAudioContext)();
            const inicio = contextoAudio.currentTime;
            
            const crearOscilador = (frecuencia, inicioOffset, duracion, volumen = 0.45) => {
                const osc = contextoAudio.createOscillator();
                const gain = contextoAudio.createGain();
                osc.type = tipo === 'volteo' ? 'sine' : 'sawtooth';
                osc.frequency.value = frecuencia;
                osc.connect(gain);
                gain.connect(contextoAudio.destination);
                gain.gain.value = 0;
                const tiempoInicio = inicio + inicioOffset;
                gain.gain.setValueAtTime(0, tiempoInicio);
                gain.gain.linearRampToValueAtTime(volumen, tiempoInicio + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.00001, tiempoInicio + duracion);
                osc.start(tiempoInicio);
                osc.stop(tiempoInicio + duracion);
                osciladoresActivos.push(osc);
                return osc;
            };
            
            if (tipo === 'volteo') {
                // Alarma para volteo: sonido más suave y corto
                crearOscilador(660, 0, 0.6, 0.4);
                crearOscilador(880, 0.7, 0.6, 0.45);
                crearOscilador(660, 1.4, 0.8, 0.4);
                if ('vibrate' in navigator) navigator.vibrate([400, 200, 400]);
                setTimeout(() => { if (alarmaActiva) detenerAlarma(); }, 2500);
            } else {
                // Alarma final: más intensa y larga
                crearOscilador(880, 0, 0.8, 0.45);
                crearOscilador(660, 0.9, 0.8, 0.45);
                crearOscilador(880, 1.8, 0.8, 0.45);
                crearOscilador(660, 2.7, 0.8, 0.45);
                crearOscilador(880, 3.6, 1.2, 0.5);
                crearOscilador(440, 4.9, 1.0, 0.5);
                if ('vibrate' in navigator) navigator.vibrate([600, 100, 600, 100, 600, 100, 600, 100, 800]);
                setTimeout(() => { if (alarmaActiva) detenerAlarma(); }, 6200);
            }
        } catch(e) {}
    }

    // ========== ACTUALIZAR DISPLAY Y ESTADO ==========
    function actualizarDisplay() {
        const minutos = Math.floor(tiempoRestante / 60);
        const segundos = tiempoRestante % 60;
        document.getElementById('cronometro').textContent = `${minutos.toString().padStart(2, '0')}:${segundos.toString().padStart(2, '0')}`;
    }

    function actualizarEstado() {
        const estadoDiv = document.getElementById('estadoTexto');
        const tiempoTranscurrido = tiempoTotalSegundos - tiempoRestante;
        const mitad = tiempoTotalSegundos / 2;
        
        if (!temporizadorActivo) {
            estadoDiv.className = 'estado espera';
            estadoDiv.innerHTML = '⏳ ESPERANDO INICIO';
        } else if (tiempoRestante <= 0) {
            estadoDiv.className = 'estado final';
            estadoDiv.innerHTML = '✅ HORNEADO COMPLETO - RETIRAR';
        } else if (tiempoTranscurrido >= mitad && !volteoActivado && tiempoRestante > 0) {
            estadoDiv.className = 'estado volteo';
            estadoDiv.innerHTML = '🔄 ¡VOLTEAR LAS LATAS! 🔄';
        } else if (tiempoRestante > 0) {
            estadoDiv.className = 'estado espera';
            estadoDiv.innerHTML = '🔥 HORNEANDO... 🔥';
        }
    }

    // ========== FUNCIÓN PRINCIPAL ==========
    function iniciarCronometro() {
        if (temporizadorActivo) {
            detenerCronometro();
        }
        
        const minutos = parseInt(document.getElementById('minutos').value) || 0;
        if (minutos < 2) {
            alert('El tiempo debe ser al menos 2 minutos para la alarma de volteo');
            return;
        }
        
        tiempoTotalSegundos = minutos * 60;
        tiempoRestante = tiempoTotalSegundos;
        volteoActivado = false;
        
        actualizarDisplay();
        actualizarEstado();
        temporizadorActivo = true;
        solicitarWakeLock();
        
        // Ocultar alertas previas
        document.getElementById('alertaVolteo').classList.remove('show');
        document.getElementById('alertaFinal').classList.remove('show');
        
        intervalo = setInterval(() => {
            if (tiempoRestante <= 0) {
                detenerCronometro();
                reproducirAlarma('final');
                mostrarAlerta('final');
                mostrarNotificacion('🍞 ¡PAN LISTO!', 'Retirar del horno');
                actualizarEstado();
            } else {
                tiempoRestante--;
                actualizarDisplay();
                
                // Verificar si llegamos a la mitad del tiempo (volteo)
                const tiempoTranscurrido = tiempoTotalSegundos - tiempoRestante;
                const mitad = tiempoTotalSegundos / 2;
                
                if (!volteoActivado && tiempoTranscurrido >= mitad) {
                    volteoActivado = true;
                    reproducirAlarma('volteo');
                    mostrarAlerta('volteo');
                    mostrarNotificacion('🔄 VOLTEAR LATAS', '¡Momento de voltear el pan!');
                }
                actualizarEstado();
            }
        }, 1000);
    }

    function detenerCronometro() {
        if (intervalo) {
            clearInterval(intervalo);
            intervalo = null;
        }
        temporizadorActivo = false;
        detenerAlarma();
        liberarWakeLock();
        actualizarEstado();
    }

    function mostrarAlerta(tipo) {
        if (tipo === 'volteo') {
            const alerta = document.getElementById('alertaVolteo');
            alerta.classList.add('show');
            setTimeout(() => alerta.classList.remove('show'), 5000);
        } else {
            const alerta = document.getElementById('alertaFinal');
            alerta.classList.add('show');
            setTimeout(() => alerta.classList.remove('show'), 8000);
        }
    }

    // ========== INICIALIZACIÓN ==========
    window.onload = () => {
        const minutosDefault = 24;
        document.getElementById('minutos').value = minutosDefault;
        tiempoTotalSegundos = minutosDefault * 60;
        tiempoRestante = tiempoTotalSegundos;
        actualizarDisplay();
        
        if ('Notification' in window && Notification.permission === 'default') {
            setTimeout(() => Notification.requestPermission(), 2000);
        }
        if ('Notification' in window && Notification.permission === 'granted') {
            document.getElementById('notifStatus').innerHTML = '✅ Notificaciones activadas';
        }
    };
</script>
</body>
</html>
