<div class="max-w-xs mx-auto mt-10 p-6 bg-white rounded-3xl shadow-xl border border-slate-100 text-center">
    <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Temporizador de Horneado</h3>
    
    <div id="display" class="text-5xl font-black text-slate-700 mb-6">00:00</div>
    
    <input type="number" id="minutosInput" placeholder="Minutos" 
           class="w-full mb-4 p-3 bg-slate-50 border-none rounded-xl text-center font-bold outline-none focus:ring-2 ring-indigo-500">
    
    <div class="flex gap-2">
        <button onclick="iniciarTimer()" class="flex-1 bg-green-500 text-white font-bold py-3 rounded-xl hover:bg-green-600 transition-all">INICIAR</button>
        <button onclick="detenerTimer()" class="flex-1 bg-red-500 text-white font-bold py-3 rounded-xl hover:bg-red-600 transition-all">PARAR</button>
    </div>
</div>

<audio id="alarma">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<script>
    let tiempoRestante;
    let intervalo;
    const sonidoAlarma = document.getElementById('alarma');
    const display = document.getElementById('display');

    function iniciarTimer() {
        // Limpiar cualquier intervalo previo
        clearInterval(intervalo);
        
        const mins = document.getElementById('minutosInput').value;
        if(!mins || mins <= 0) return;

        tiempoRestante = mins * 60;

        intervalo = setInterval(() => {
            const minutos = Math.floor(tiempoRestante / 60);
            const segundos = tiempoRestante % 60;

            // Formatear salida (00:00)
            display.innerText = `${minutos.toString().padStart(2, '0')}:${segundos.toString().padStart(2, '0')}`;

            if (tiempoRestante <= 0) {
                clearInterval(intervalo);
                sonidoAlarma.play(); // ¡AQUÍ SUENA LA ALARMA!
                alert("¡El pan está listo!");
            } else {
                tiempoRestante--;
            }
        }, 1000);
    }

    function detenerTimer() {
        clearInterval(intervalo);
        sonidoAlarma.pause();
        sonidoAlarma.currentTime = 0;
    }
</script>
